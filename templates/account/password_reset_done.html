{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Forge Pro | Check Your Email</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .success-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
        .auth-footer a {
            color: var(--sun);
            text-decoration: none;
            font-weight: 700;
        }
        .auth-page::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(52, 211, 153, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(251, 191, 36, 0.06) 0%, transparent 50%);
            animation: authBgFloat 12s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card glass">
            <div class="auth-header">
                <div class="logo">🔥 Habit Forge <span class="badge">PRO</span></div>
            </div>
            <div class="success-icon">📧</div>
            <h2 style="color: var(--text); margin-bottom: 16px;">Check Your Email</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 30px;">
                We have sent you an e-mail. If you have not received it, please check your spam folder.
            </p>
            <div class="auth-footer">
                Back to <a href="{% url 'login' %}">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
