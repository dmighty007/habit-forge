{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Forge Pro | Change Password</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-header .logo {
            font-size: 2rem;
            font-weight: 900;
            font-family: var(--font-alt);
            background: linear-gradient(135deg, var(--sun), var(--coral), var(--lavender));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }
        .auth-form .form-group {
            margin-bottom: 20px;
        }
        .auth-form label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .auth-form input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: var(--text);
            font-family: var(--font-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }
        .auth-form input:focus {
            border-color: var(--sun);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.12);
        }
        .auth-submit {
            width: 100%;
            padding: 16px;
            margin-top: 8px;
            font-size: 0.95rem;
        }
        .auth-error {
            background: rgba(251, 113, 133, 0.1);
            border: 1px solid rgba(251, 113, 133, 0.25);
            color: var(--coral);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .auth-page::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(192, 132, 252, 0.06) 0%, transparent 50%);
            animation: authBgFloat 12s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card glass">
            <div class="auth-header">
                <div class="logo">🔥 Habit Forge <span class="badge">PRO</span></div>
                <h2 style="color: var(--text); margin-top: 16px; font-size: 1.4rem;">Change Password</h2>
            </div>

            {% if token_fail %}
                <div class="auth-error">
                    ⚠️ The password reset link was invalid, possibly because it has already been used. Please request a new password reset.
                </div>
                <div style="text-align:center;">
                    <a href="{% url 'account_reset_password' %}" class="primary-btn" style="display:inline-block; padding:12px 24px; text-decoration:none;">Request New Link</a>
                </div>
            {% else %}
                <form method="post" action="{{ action_url }}" class="auth-form">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" name="password1" placeholder="Enter new password" required autofocus>
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" name="password2" placeholder="Repeat new password" required>
                    </div>
                    <button type="submit" class="primary-btn auth-submit">⚡ Change Password</button>
                </form>
            {% endif %}
        </div>
    </div>
</body>
</html>
