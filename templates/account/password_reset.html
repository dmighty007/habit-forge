{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Forge Pro | Reset Password</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            animation: authSlideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-header .logo {
            font-size: 2rem;
            font-weight: 900;
            font-family: var(--font-alt);
            background: linear-gradient(135deg, var(--sun), var(--coral), var(--lavender));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }
        .auth-form .form-group {
            margin-bottom: 20px;
        }
        .auth-form label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .auth-form input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: var(--text);
            font-family: var(--font-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }
        .auth-form input:focus {
            border-color: var(--sun);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.12);
        }
        .auth-submit {
            width: 100%;
            padding: 16px;
            margin-top: 8px;
            font-size: 0.95rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--sun);
            text-decoration: none;
            font-weight: 700;
        }
        .auth-page::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(192, 132, 252, 0.06) 0%, transparent 50%);
            animation: authBgFloat 12s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes authBgFloat {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(3%, 3%); }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card glass">
            <div class="auth-header">
                <div class="logo">🔥 Habit Forge <span class="badge">PRO</span></div>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 10px;">Reset your password</p>
            </div>

            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 24px; line-height: 1.5; text-align: center;">
                Forgotten your password? Enter your e-mail address below, and we'll send you an e-mail allowing you to reset it.
            </p>

            <form method="post" action="{% url 'account_reset_password' %}" class="auth-form">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="your@email.com" required autofocus>
                </div>
                <button type="submit" class="primary-btn auth-submit">⚡ Send Reset Email</button>
            </form>

            <div class="auth-footer">
                Remembered it? <a href="{% url 'login' %}">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
